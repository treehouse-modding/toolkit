name: GitHub Wiki

on:
  push:
    branches: [main]
    paths:
      - wiki/**
      - .github/workflows/wiki.yml

concurrency:
  group: wiki
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Publish repository wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v5.0.4